# freellmpool built-in provider catalog.
#
# Keys are NEVER stored here — only the *name* of the environment variable that
# holds the key. Users supply their own keys (see .env.example / docs/ACCOUNTS.md).
#
# Fields:
#   id           unique short id
#   label        human-friendly name
#   adapter      "openai" | "gemini" | "cloudflare"  (request/response shape)
#   base_url     endpoint base (may contain {account_id} for cloudflare)
#   key_env      env var holding the API key (omit for keyless providers)
#   auth         "bearer" (default) | "none" (keyless — no Authorization header)
#   key_optional true = works without a key, but uses one if present
#   extra_env    optional list of additional required env vars
#   models       list of { name, rpd } — rpd is a free-tier daily request hint
#                used for quota tracking (0 = unknown/unmetered).
#
# rpd values are conservative public free-tier hints as of 2026 and drift over
# time; freellmpool treats them as soft budgets and reacts to real 429s at call
# time. Override per-user in ~/.config/freellmpool/providers.toml.

# ---- Keyless / zero-setup (works out of the box) ----------------------------
# LLM7 first: it's the most reliable keyless pool. OVHcloud's anonymous tier is
# generous but rate-limits aggressively, so it sits second as a bonus.

[[provider]]
id = "llm7"
label = "LLM7 (key optional)"
adapter = "openai"
base_url = "https://api.llm7.io/v1"
key_env = "LLM7_API_KEY"
key_optional = true
models = [{ name = "codestral-latest", rpd = 0 }]

[[provider]]
id = "ovh"
label = "OVHcloud AI Endpoints (keyless)"
adapter = "openai"
base_url = "https://oai.endpoints.kepler.ai.cloud.ovh.net/v1"
auth = "none"
models = [
    { name = "Meta-Llama-3_3-70B-Instruct", rpd = 0 },
    { name = "Llama-3.1-8B-Instruct", rpd = 0 },
    { name = "Qwen3.5-397B-A17B", rpd = 0 },
    { name = "gpt-oss-120b", rpd = 0 },
    { name = "Mistral-Small-3.2-24B-Instruct-2506", rpd = 0 },
]

