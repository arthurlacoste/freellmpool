<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 767 455" width="767" version="1.1">
    <defs>
        <termtosvg:template_settings xmlns:termtosvg="https://github.com/nbedos/termtosvg">
            <termtosvg:screen_geometry columns="90" rows="22"/>
            <termtosvg:animation type="css"/>
        </termtosvg:template_settings>
        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 4909ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
10.206%{transform:translateY(-408px)}
30.617%{transform:translateY(-816px)}
40.803%{transform:translateY(-1224px)}
69.566%{transform:translateY(-1632px)}
79.629%{transform:translateY(-2040px)}
100.000%{transform:translateY(-2040px)}
            }

            #screen_view {
                animation-duration: 4909ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
        <style type="text/css" id="user-style">
            /* The colors defined below are the default 16 colors used for rendering text of the terminal. Adjust
