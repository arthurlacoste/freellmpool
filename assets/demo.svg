    <svg id="screen" width="720" height="374" x="23" y="50" viewBox="0 0 720 374" preserveAspectRatio="xMidYMin slice"><rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="8" fill="#5faf5f">$</text><text x="8" textLength="8" class="foreground"> </text><text x="16" textLength="184" font-weight="bold" class="foreground">pip install freellmpool</text></g><g id="g2"><text x="0" textLength="8" class="background"> </text></g><g id="g3"><text x="0" textLength="536" fill="#808080">Successfully installed freellmpool-0.11.2   (one dependency: httpx)</text></g><g id="g4"><text x="0" textLength="8" fill="#5faf5f">$</text><text x="8" textLength="8" class="foreground"> </text><text x="16" textLength="448" font-weight="bold" class="foreground">freellmpool providers          # 18 free tiers, one pool</text></g><g id="g5"><text x="0" textLength="360" class="foreground">freellmpool catalog: 18 providers, 237 models</text></g><g id="g6"><text x="0" textLength="600" class="foreground">  &#10003; pollinations Pollinations (keyless)       3 models         [configured]</text></g><g id="g7"><text x="0" textLength="608" class="foreground">  &#10003; llm7         LLM7 (key optional)          4 models (+5 off) [configured]</text></g><g id="g8"><text x="0" textLength="624" class="foreground">  &#10003; ovh          OVHcloud AI Endpoints (keyless) 13 models        [configured]</text></g><g id="g9"><text x="0" textLength="648" class="foreground">  &#183; groq         Groq                         9 models         [set GROQ_API_KEY]</text></g><g id="g10"><text x="0" textLength="688" class="foreground">  &#183; cerebras     Cerebras                     2 models (+2 off) [set CEREBRAS_API_KEY]</text></g><g id="g11"><text x="0" textLength="688" class="foreground">  &#183; nvidia       NVIDIA NIM                   40 models (+53 off) [set NVIDIA_API_KEY]</text></g><g id="g12"><text x="0" textLength="8" fill="#5faf5f">$</text><text x="8" textLength="8" class="foreground"> </text><text x="16" textLength="504" font-weight="bold" class="foreground">freellmpool code claude        # run Claude Code on free models</text></g><g id="g13"><text x="0" textLength="384" class="foreground">Wire Claude Code to free models via freellmpool:</text></g><g id="g14"><text x="0" textLength="272" class="foreground">  1. freellmpool proxy --port 8080</text></g><g id="g15"><text x="0" textLength="632" class="foreground">  2. export ANTHROPIC_BASE_URL=http://localhost:8080 ANTHROPIC_API_KEY=anything</text></g><g id="g16"><text x="0" textLength="544" class="foreground">  3. claude   # now running on free models via the /v1/messages shim</text></g></defs><g id="screen_view"><g><use xlink:href="#g1" y="0"/><rect x="0" y="17" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="17"/></g><g><use xlink:href="#g1" y="408"/><use xlink:href="#g3" y="425"/><rect x="0" y="442" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="442"/></g><g><use xlink:href="#g1" y="816"/><use xlink:href="#g3" y="833"/><use xlink:href="#g4" y="850"/><rect x="0" y="867" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="867"/></g><g><use xlink:href="#g1" y="1224"/><use xlink:href="#g3" y="1241"/><use xlink:href="#g4" y="1258"/><use xlink:href="#g5" y="1275"/><use xlink:href="#g6" y="1309"/><use xlink:href="#g7" y="1326"/><use xlink:href="#g8" y="1343"/><use xlink:href="#g9" y="1360"/><use xlink:href="#g10" y="1377"/><use xlink:href="#g11" y="1394"/><rect x="0" y="1411" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="1411"/></g><g><use xlink:href="#g1" y="1632"/><use xlink:href="#g3" y="1649"/><use xlink:href="#g4" y="1666"/><use xlink:href="#g5" y="1683"/><use xlink:href="#g6" y="1717"/><use xlink:href="#g7" y="1734"/><use xlink:href="#g8" y="1751"/><use xlink:href="#g9" y="1768"/><use xlink:href="#g10" y="1785"/><use xlink:href="#g11" y="1802"/><use xlink:href="#g12" y="1819"/><rect x="0" y="1836" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="1836"/></g><g><use xlink:href="#g1" y="2040"/><use xlink:href="#g3" y="2057"/><use xlink:href="#g4" y="2074"/><use xlink:href="#g5" y="2091"/><use xlink:href="#g6" y="2125"/><use xlink:href="#g7" y="2142"/><use xlink:href="#g8" y="2159"/><use xlink:href="#g9" y="2176"/><use xlink:href="#g10" y="2193"/><use xlink:href="#g11" y="2210"/><use xlink:href="#g12" y="2227"/><use xlink:href="#g13" y="2244"/><use xlink:href="#g14" y="2278"/><use xlink:href="#g15" y="2295"/><use xlink:href="#g16" y="2312"/><rect x="0" y="2346" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="2346"/></g></g></svg>
